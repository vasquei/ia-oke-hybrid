apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama 
  namespace: ollama 
  labels:
    app: ollama 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama 
  template:
    metadata:
      labels:
        app: ollama 
    spec:
      containers:
        - name: ollama 
          image: gru.ocir.io/gry3ikxpsjou/repo/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting Ollama server in background..."
              ollama serve &
              echo "Waiting for server..."
              sleep 10
              echo "Pulling model gpt-oss:20b..."
              ollama pull gemma3:1b 
              ollama pull llama3.2:3b
              ollama pull gpt-oss:20b
              echo "Model ready. Keeping Ollama running in foreground..."
              wait 
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: pvc-ollama
      imagePullSecrets:
      - name: ocir
