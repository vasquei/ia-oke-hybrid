apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-chat
  namespace: itti
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-chat
  template:
    metadata:
      labels:
        app: ollama-chat
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: name
                operator: In
                values:
                - poolvirtual
      tolerations:
        - key: "virtual-kubelet.io/provider"
          operator: "Exists"
      containers:
        - name: chat
          image: ord.ocir.io/ax0yupcusky2/repo/ollama-chat:latest
          ports:
            - containerPort: 3000


